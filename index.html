<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILION AI Bot</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; }
        #chat-box { width: 80%; max-width: 600px; height: 400px; border: 1px solid #333; overflow-y: auto; padding: 20px; margin-bottom: 20px; background: #1e1e1e; border-radius: 10px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .user { background: #007bff; text-align: right; margin-left: 20%; }
        .bot { background: #333; text-align: left; margin-right: 20%; }
        #input-area { display: flex; width: 80%; max-width: 600px; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Projekt MILION 🚀</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Napiš něco botovi...">
        <button onclick="sendMessage()">Odeslat</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value;
            if (!message) return;

            // Přidání tvé zprávy do chatu
            chatBox.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';

            // Odeslání zprávy na tvůj server (do app.py)
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            
            // Přidání odpovědi od Gemini do chatu
            chatBox.innerHTML += `<div class="message bot">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
