<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILION AI</title>
    <style>
        body { background-color: #0e0e0e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { background: #333; align-self: flex-end; }
        .ai { background: #007bff; align-self: flex-start; }
        #input-container { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #2a2a2a; color: #fff; outline: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        h1 { text-align: center; color: #555; font-size: 1.2rem; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>MILION AI SYSTEM v1.0</h1>
    <div id="chat-container">
        <div class="message ai">Systém připraven. Jak ti můžu dnes pomoct vybudovat impérium?</div>
    </div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Napiš zprávu...">
        <button onclick="sendMessage()">ODESLAT</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const message = input.value.trim();
            if (!message) return;

            // Přidat zprávu uživatele na web
            container.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                // Poslat zprávu na tvůj server na Renderu
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Přidat odpověď AI
                container.innerHTML += `<div class="message ai">${data.reply}</div>`;
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                container.innerHTML += `<div class="message ai" style="color:red">Chyba spojení: ${err}</div>`;
            }
        }

        // Odesílání Enterem
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
