<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zákaznická podpora | AI Servis</title>
    <style>
        :root { --accent: #a855f7; --bg: #0f172a; }
        body { 
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%; animation: gradient 15s ease infinite;
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100vh; overflow: hidden;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #chat-button { 
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; color: white; font-size: 28px; z-index: 1000; 
            background: var(--accent); box-shadow: 0 8px 15px rgba(168, 85, 247, 0.4); 
            transition: 0.3s; 
        }

        #chat-window { 
            position: fixed; bottom: 90px; right: 20px; width: 350px; height: 480px; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            display: none; flex-direction: column; overflow: hidden; z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1); animation: openWindow 0.3s ease;
        }
        @keyframes openWindow { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #chat-header { 
            padding: 15px; color: white; font-weight: 700; font-size: 16px; 
            background: linear-gradient(90deg, #6d28d9, #a855f7); text-align: center;
        }
        
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.4; max-width: 85%; }
        .ai-msg { background: rgba(255,255,255,0.08); color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 3px; }
        .user-msg { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 3px; }

        /* --- TADY JE TA OPRAVENÁ SWIPE LIŠTA --- */
        #quick-actions { 
            padding: 10px 15px; 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; /* Povolí vodorovný posun */
            white-space: nowrap; 
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            -ms-overflow-style: none;  /* Schová scrollbar v IE */
            scrollbar-width: none;  /* Schová scrollbar v Firefoxu */
        }
        #quick-actions::-webkit-scrollbar { display: none; } /* Schová scrollbar v Chrome/Safari */

        .action-btn { 
            background: rgba(168, 85, 247, 0.1); 
            border: 1px solid var(--accent); 
            padding: 7px 14px; 
            border-radius: 12px; 
            font-size: 11px; 
            cursor: pointer; 
            color: #d8b4fe; 
            transition: 0.2s; 
            font-weight: 600;
            flex-shrink: 0; /* Zabrání tlačítkům, aby se smrskla */
        }
        .action-btn:hover { background: var(--accent); color: white; box-shadow: 0 0 10px var(--accent); }

        #chat-input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        #chat-input { 
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; outline: none; font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="chat-button" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div id="chat-header">Zákaznická podpora 24/7</div>
        <div id="chat-messages"></div>
        
        <div id="quick-actions">
            <button class="action-btn" onclick="quickAsk('🛠️ Jaké služby nabízíte?')">🛠️ Služby</button>
            <button class="action-btn" onclick="quickAsk('💰 Jaký máte ceník?')">💰 Ceník</button>
            <button class="action-btn" onclick="quickAsk('📧 Chci vám nechat kontakt')">📧 Kontakt</button>
            <button class="action-btn" onclick="quickAsk('📍 Kde vás najdu?')">📍 Pobočka</button>
            <button class="action-btn" onclick="quickAsk('⭐ Jaké máte recenze?')">⭐ Recenze</button>
        </div>

        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Napište nám..." onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('http://127.0.0.1:8000/config');
                const config = await res.json();
                addMessage(config.uvitaci_zprava, 'ai');
            } catch(e) { addMessage("Server je offline!", 'ai'); }
        }
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }
        function addMessage(text, side) {
            const msgs = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `msg ${side}-msg`;
            div.innerText = text;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }
        function quickAsk(text) { 
            addMessage(text, 'user');
            fetchAnswer(text);
        }
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            addMessage(text, 'user');
            input.value = '';
            fetchAnswer(text);
        }
        async function fetchAnswer(text) {
            try {
                const res = await fetch(`http://127.0.0.1:8000/ask?question=${encodeURIComponent(text)}`);
                const data = await res.json();
                addMessage(data.ai_odpoved, 'ai');
            } catch(e) { addMessage("Chyba spojení se serverem.", 'ai'); }
        }
        loadConfig();
    </script>
</body>
</html>
