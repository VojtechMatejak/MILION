<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILION AI Dark Widget</title>
    <style>
        /* Černý pozadí celé stránky, aby ti to neodjebalo dekel */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; background-color: #000; height: 100vh; }
        
        /* Plovoucí tlačítko (bublina) */
        #chat-launcher {
            position: fixed; bottom: 20px; right: 20px;
            width: 65px; height: 65px; background: #007bff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,123,255,0.4); z-index: 1000;
            transition: all 0.3s ease;
        }
        #chat-launcher:hover { transform: scale(1.1) rotate(5deg); }

        /* Hlavní okno chatu */
        #chat-window {
            display: none; position: fixed; bottom: 100px; right: 20px;
            width: 380px; height: 550px; background: #121212;
            border-radius: 20px; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden;
            border: 1px solid #222; z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #chat-header { background: #007bff; color: white; padding: 18px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; color: #e0e0e0; }
        
        /* Styly zpráv */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user { background: #2c2c2c; align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; }
        .ai { background: #007bff; align-self: flex-start; color: #fff; border-bottom-left-radius: 4px; }

        /* Vstupní pole */
        #chat-input-area { display: flex; padding: 15px; background: #181818; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; border: none; padding: 12px; border-radius: 10px; background: #252525; color: white; outline: none; transition: background 0.3s; }
        input:focus { background: #333; }
        button { background: #007bff; border: none; color: white; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }

        /* Scrollbar styling */
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="chat-launcher" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div id="chat-header">MILION AI SYSTEM v1.0</div>
        <div id="chat-messages">
            <div class="msg ai">Systém online. Jsme v Dark Modu, šetříme oči i baterku. Co budeme tvořit?</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Napiš zprávu..." autocomplete="off">
            <button onclick="sendMessage()">POSLAT</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('chat-messages');
            const text = input.value.trim();
            if (!text) return;

            messages.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                messages.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                messages.scrollTop = messages.scrollHeight;
            } catch (e) {
                messages.innerHTML += `<div class="msg ai" style="color:#ff4d4d">Chyba spojení. Server asi spí.</div>`;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
