<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILION AI Widget</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; }
        
        /* Plovoucí tlačítko (bublina) */
        #chat-launcher {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px; background: #007bff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;
            transition: transform 0.3s;
        }
        #chat-launcher:hover { transform: scale(1.1); }

        /* Hlavní okno chatu */
        #chat-window {
            display: none; position: fixed; bottom: 90px; right: 20px;
            width: 350px; height: 500px; background: #1a1a1a;
            border-radius: 15px; flex-direction: column;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5); overflow: hidden;
            border: 1px solid #333; z-index: 1000;
        }

        #chat-header { background: #007bff; color: white; padding: 15px; font-weight: bold; text-align: center; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; color: white; }
        
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .user { background: #444; align-self: flex-end; }
        .ai { background: #007bff; align-self: flex-start; }

        #chat-input-area { display: flex; padding: 10px; background: #222; gap: 5px; }
        input { flex: 1; border: none; padding: 10px; border-radius: 5px; background: #333; color: white; outline: none; }
        button { background: #007bff; border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-launcher" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div id="chat-header">MILION AI SYSTEM v1.0</div>
        <div id="chat-messages">
            <div class="msg ai">Ahoj! Jsem tvůj AI asistent. Jak ti můžu pomoct?</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Napiš zprávu...">
            <button onclick="sendMessage()">Poslat</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('chat-messages');
            const text = input.value.trim();
            if (!text) return;

            messages.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                messages.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                messages.scrollTop = messages.scrollHeight;
            } catch (e) {
                messages.innerHTML += `<div class="msg ai" style="color:red">Chyba: Zkus to znovu.</div>`;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
